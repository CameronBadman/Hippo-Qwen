<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HippoGraph</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar">
        <div>
          <h1>HippoGraph</h1>
          <p>Local graph memory runtime</p>
        </div>
        <button id="decayBtn" title="Run edge decay and garbage collection">Decay</button>
      </section>

      <section class="workspace">
        <form id="memoryForm" class="panel">
          <h2>Remember</h2>
          <textarea id="memoryText" placeholder="Memory text" required></textarea>
          <div class="row">
            <input id="memoryProject" placeholder="project/topic" />
            <input id="memoryImportance" type="number" min="0" max="1" step="0.1" value="0.5" />
          </div>
          <button type="submit">Add Memory</button>
        </form>

        <form id="searchForm" class="panel">
          <h2>Search</h2>
          <textarea id="queryText" placeholder="Ask a memory question" required></textarea>
          <div class="row">
            <input id="limit" type="number" min="1" max="20" value="8" />
            <input id="budget" type="number" min="200" max="6000" value="1800" />
          </div>
          <button type="submit">Search</button>
        </form>
      </section>

      <section class="results">
        <div class="panel">
          <h2>Vector Baseline</h2>
          <ol id="vectorResults"></ol>
        </div>
        <div class="panel">
          <h2>Graph Retrieval</h2>
          <ol id="graphResults"></ol>
          <div class="feedback">
            <button id="helpfulBtn">Helpful</button>
            <button id="ignoredBtn">Ignored</button>
            <button id="correctedBtn">Corrected</button>
          </div>
        </div>
      </section>

      <section class="panel graph-panel">
        <div class="graph-head">
          <h2>Graph</h2>
          <span id="graphStats"></span>
        </div>
        <svg id="graphSvg" viewBox="0 0 1100 460" role="img" aria-label="memory graph"></svg>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
